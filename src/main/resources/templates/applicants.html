<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Applicants</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet"/>
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #198754; }
        .navbar-brand, .nav-link { color: white !important; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🏢 Job Portal</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/recruiter/dashboard">Dashboard</a>
                </li>
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post">
                        <button class="btn btn-outline-light btn-sm mt-1">
                            Logout
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">

    <!-- Job info -->
    <div class="card p-3 mb-4">
        <h5>
            Applicants for :
            <strong th:text="${job.title}"></strong>
        </h5>
        <p class="text-muted mb-0">
            🏢 <span th:text="${job.companyName}"></span> |
            Required : <span th:text="${job.requiredSkills}"></span>
        </p>
    </div>

    <!-- No applicants -->
    <div th:if="${#lists.isEmpty(applicants)}"
         class="alert alert-info">
        No applications received yet for this job.
    </div>

    <!-- Ranked applicants table -->
    <div th:if="${!#lists.isEmpty(applicants)}"
         class="card p-4">
        <h6 class="mb-3">
            📊 Candidates ranked by match score (highest first)
        </h6>

        <table class="table table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Rank</th>
                    <th>Candidate Name</th>
                    <th>Email</th>
                    <th>Match Score</th>
                    <th>Skills Found</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="app, stat : ${applicants}">

                    <!-- Rank number -->
                    <td>
                        <strong th:text="${stat.index + 1}"></strong>
                    </td>

                    <td th:text="${app.candidate.fullName}"></td>
                    <td th:text="${app.candidate.email}"></td>

                    <!-- Color coded score -->
                    <td>
                        <span th:if="${app.matchScore >= 70}"
                              style="color:green; font-weight:bold"
                              th:text="${app.matchScore} + '%'">
                        </span>
                        <span th:if="${app.matchScore >= 40 and app.matchScore < 70}"
                              style="color:orange; font-weight:bold"
                              th:text="${app.matchScore} + '%'">
                        </span>
                        <span th:if="${app.matchScore < 40}"
                              style="color:red; font-weight:bold"
                              th:text="${app.matchScore} + '%'">
                        </span>
                    </td>

                    <td th:text="${app.extractedSkills}"></td>

                    <!-- Status badge -->
                    <td>
                        <span th:if="${app.status == 'PENDING'}"
                              class="badge bg-warning text-dark">
                            PENDING
                        </span>
                        <span th:if="${app.status == 'ACCEPTED'}"
                              class="badge bg-success">
                            ACCEPTED
                        </span>
                        <span th:if="${app.status == 'REJECTED'}"
                              class="badge bg-danger">
                            REJECTED
                        </span>
                    </td>

                    <!-- Accept / Reject buttons -->
                    <td>
                        <form th:action="@{/recruiter/update-status/{id}(id=${app.id})}"
                              method="post"
                              style="display:inline">
                            <button name="status"
                                    value="ACCEPTED"
                                    class="btn btn-success btn-sm">
                                ✅ Accept
                            </button>
                            <button name="status"
                                    value="REJECTED"
                                    class="btn btn-danger btn-sm">
                                ❌ Reject
                            </button>
                        </form>
                    </td>

                </tr>
            </tbody>
        </table>
    </div>

    <a href="/recruiter/dashboard"
       class="btn btn-outline-secondary mt-3">
        ← Back to Dashboard
    </a>

</div>
</body>
</html>
