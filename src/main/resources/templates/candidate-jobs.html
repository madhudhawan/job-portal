<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Browse Jobs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet"/>
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #0d6efd; }
        .navbar-brand, .nav-link { color: white !important; }
        .job-card { transition: transform 0.2s; }
        .job-card:hover { transform: translateY(-3px); }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🏢 Job Portal</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/candidate/dashboard">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/candidate/jobs">Browse Jobs</a>
                </li>
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post">
                        <button class="btn btn-outline-light btn-sm mt-1">
                            Logout
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <h4 class="mb-4">🔍 Available Jobs</h4>

    <!-- Already applied message -->
    <div th:if="${param.alreadyApplied}"
         class="alert alert-warning">
        ⚠️ You have already applied to this job!
    </div>

    <!-- No jobs available -->
    <div th:if="${#lists.isEmpty(jobs)}"
         class="alert alert-info">
        No jobs available right now. Check back later!
    </div>

    <!-- Job cards -->
    <div class="row">
        <div class="col-md-6 mb-4 job-card"
             th:each="job : ${jobs}">
            <div class="card p-4 h-100">

                <h5 th:text="${job.title}"></h5>
                <p class="text-muted mb-1">
                    🏢 <span th:text="${job.companyName}"></span>
                </p>
                <p class="mb-2"
                   th:text="${job.description}">
                </p>
                <p class="mb-3">
                    <strong>Required Skills : </strong>
                    <span th:text="${job.requiredSkills}"></span>
                </p>

                <!-- View detail and apply button -->
                <a th:href="@{/candidate/job/{id}(id=${job.id})}"
                   class="btn btn-primary mt-auto">
                    View & Apply
                </a>

            </div>
        </div>
    </div>

</div>
</body>
</html>
