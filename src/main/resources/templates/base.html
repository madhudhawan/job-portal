<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Job Portal</title>

    <!-- Bootstrap CSS — handles all styling for us -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet"/>

    <!-- Custom styles -->
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #0d6efd; }
        .navbar-brand, .nav-link { color: white !important; }
        .card { border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .score-high { color: green; font-weight: bold; }
        .score-mid  { color: orange; font-weight: bold; }
        .score-low  { color: red; font-weight: bold; }
    </style>
</head>
<body>

<!-- ==============================
     NAVBAR
     ============================== -->
<nav class="navbar navbar-expand-lg mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🏢 Job Portal</a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">

                <!-- Show these links only when logged in -->
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <span class="nav-link">
                        Welcome, <strong sec:authentication="name"></strong>
                    </span>
                </li>

                <!-- Candidate links -->
                <li class="nav-item" sec:authorize="hasRole('CANDIDATE')">
                    <a class="nav-link" href="/candidate/dashboard">Dashboard</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('CANDIDATE')">
                    <a class="nav-link" href="/candidate/jobs">Browse Jobs</a>
                </li>

                <!-- Recruiter links -->
                <li class="nav-item" sec:authorize="hasRole('RECRUITER')">
                    <a class="nav-link" href="/recruiter/dashboard">Dashboard</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('RECRUITER')">
                    <a class="nav-link" href="/recruiter/post-job">Post Job</a>
                </li>

                <!-- Logout -->
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post">
                        <button class="btn btn-outline-light btn-sm mt-1">
                            Logout
                        </button>
                    </form>
                </li>

                <!-- Login / Register when not logged in -->
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link" href="/login">Login</a>
                </li>
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link" href="/register">Register</a>
                </li>

            </ul>
        </div>
    </div>
</nav>

<!-- Page content goes here -->
<div class="container">
    <div th:fragment="content"></div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
</script>
</body>
</html>
