<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Job Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet"/>
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #0d6efd; }
        .navbar-brand, .nav-link { color: white !important; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🏢 Job Portal</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/candidate/dashboard">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/candidate/jobs">Browse Jobs</a>
                </li>
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post">
                        <button class="btn btn-outline-light btn-sm mt-1">
                            Logout
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="card p-4">

        <!-- Job Info -->
        <h3 th:text="${job.title}"></h3>
        <p class="text-muted">
            🏢 <span th:text="${job.companyName}"></span>
        </p>

        <hr/>

        <h6>Job Description</h6>
        <p th:text="${job.description}"></p>

        <h6>Required Skills</h6>
        <p>
            <span th:each="skill, stat : ${#strings.arraySplit(job.requiredSkills, ',')}"
                  class="badge bg-primary me-1"
                  th:text="${skill}">
            </span>
        </p>

        <hr/>

        <!-- Already applied message -->
        <div th:if="${alreadyApplied}"
             class="alert alert-warning">
            ✅ You have already applied to this job.
        </div>

        <!-- Apply form — only show if not already applied -->
        <div th:if="${!alreadyApplied}">
            <h6>Apply Now — Upload Your Resume</h6>

            <form th:action="@{/candidate/apply/{id}(id=${job.id})}"
                  method="post"
                  enctype="multipart/form-data">

                <div class="mb-3">
                    <label class="form-label">
                        Upload Resume (PDF only, max 10MB)
                    </label>
                    <input type="file"
                           name="resumeFile"
                           class="form-control"
                           accept=".pdf"
                           required/>
                </div>

                <button type="submit"
                        class="btn btn-success">
                    🚀 Submit Application
                </button>

            </form>
        </div>

        <a href="/candidate/jobs"
           class="btn btn-outline-secondary mt-3">
            ← Back to Jobs
        </a>

    </div>
</div>
</body>
</html>
