<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Recruiter Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet"/>
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #198754; }
        .navbar-brand, .nav-link { color: white !important; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🏢 Job Portal</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link"
                       href="/recruiter/dashboard">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link"
                       href="/recruiter/post-job">Post Job</a>
                </li>
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post">
                        <button class="btn btn-outline-light btn-sm mt-1">
                            Logout
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">

    <h4 class="mb-4">
        Welcome, <span th:text="${recruiter.fullName}"></span>! 👋
    </h4>

    <!-- Job posted success message -->
    <div th:if="${param.jobPosted}"
         class="alert alert-success">
        ✅ Job posted successfully!
    </div>

    <!-- My job listings -->
    <div class="card p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5>📋 My Job Listings</h5>
            <a href="/recruiter/post-job"
               class="btn btn-success btn-sm">
                + Post New Job
            </a>
        </div>

        <!-- No jobs yet -->
        <div th:if="${#lists.isEmpty(myJobs)}"
             class="text-muted">
            You have not posted any jobs yet.
            <a href="/recruiter/post-job">Post your first job</a>
        </div>

        <!-- Jobs table -->
        <table th:if="${!#lists.isEmpty(myJobs)}"
               class="table table-hover">
            <thead class="table-success">
                <tr>
                    <th>Job Title</th>
                    <th>Company</th>
                    <th>Required Skills</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="job : ${myJobs}">
                    <td th:text="${job.title}"></td>
                    <td th:text="${job.companyName}"></td>
                    <td th:text="${job.requiredSkills}"></td>
                    <td>
                        <!-- View ranked applicants -->
                        <a th:href="@{/recruiter/applicants/{id}(id=${job.id})}"
                           class="btn btn-primary btn-sm">
                            View Applicants
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>
</body>
</html>
